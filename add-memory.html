<div class="memory-container">

    <h1>Add New Memory</h1>

    <form onsubmit="saveMemory(event)">

        <input type="text" placeholder="Memory Title" required>

        <input type="date" required>

        <input type="text" placeholder="Location">

        <select>
            <option>Select Mood</option>
            <option>😊 Happy</option>
            <option>❤️ Love</option>
            <option>🎉 Celebration</option>
            <option>😢 Sad</option>
            <option>😎 Adventure</option>
        </select>

        <textarea placeholder="Write your memory..." rows="6"></textarea>

        <input type="file">

        <button type="submit">Save Memory</button>

    </form>

</div>
